<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lloc en Manteniment</title>
	  <link rel="icon" href="https://santcugat-pro.s3.eu-south-2.amazonaws.com/2og1akmd4npj4ok0pq2uwg5bwzd0" sizes="any">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
		.icon img{
			max-width:250px;
		}

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #68b022;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">
			<img alt="Logo oficial de Decidim Sant Cugat" src="https://santcugat-pro.s3.eu-south-2.amazonaws.com/13ink3x8d4u1un6corczd7ke7kr6">
		</div>
        <div class="loader"></div>
        <h1>Estem en manteniment</h1>
        <p>La nostra plataforma es troba actualment en manteniment programat. Si us plau, torna dins d'una estona.</p>
    </div>

</body>
</html>
